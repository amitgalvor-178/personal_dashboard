<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command — Amit Singh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #f5f1eb;
    --surface:      #edeae3;
    --surface-2:    #e4dfd6;
    --surface-3:    #dbd5cb;
    --border:       #cec8be;
    --border-light: #b8b0a4;
    --text:         #1c1916;
    --text-dim:     #6b6560;
    --text-muted:   #a09890;
    --gold:         #8a5e18;
    --gold-dim:     #c49a50;
    --high:         #b02a2a;
    --med:          #a05818;
    --low:          #2e6e42;
    --done-clr:     #3a6a4a;
    --font-serif:   'Cormorant Garamond', Georgia, serif;
    --font-mono:    'IBM Plex Mono', 'Courier New', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-serif);
    height: 100%;
    overflow: hidden;
  }

  /* ─── PAGES ─────────────────────────────── */
  .page { display: none; height: 100%; }
  .page.active { display: flex; flex-direction: column; }

  /* ─── HOME ──────────────────────────────── */
  #home {
    padding: 56px 52px 40px;
    overflow-y: auto;
  }

  .home-header { margin-bottom: 56px; }

  .home-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .home-title {
    font-size: 80px;
    font-weight: 300;
    letter-spacing: -0.025em;
    line-height: 0.88;
    color: var(--text);
  }

  .home-title em {
    font-style: italic;
    color: var(--gold);
  }

  .home-date {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 22px;
    letter-spacing: 0.08em;
  }

  .gold-rule {
    width: 48px;
    height: 1px;
    background: var(--gold);
    margin: 20px 0;
  }

  .sections-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .section-card {
    background: var(--bg);
    padding: 36px 28px 32px;
    position: relative;
    overflow: hidden;
    transition: background 0.25s ease;
  }

  .section-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.35s ease;
  }

  .section-card.enabled { cursor: pointer; }
  .section-card.enabled:hover { background: var(--surface); }
  .section-card.enabled:hover::after { transform: scaleX(1); }

  .section-card.disabled { opacity: 0.3; cursor: not-allowed; }

  .card-number {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.25em;
    margin-bottom: 22px;
  }

  .card-title {
    font-size: 19px;
    font-weight: 400;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 18px;
  }

  .card-badge {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 3px 8px;
    border: 1px solid;
    display: inline-block;
  }

  .card-badge.active { color: var(--gold); border-color: var(--gold-dim); }
  .card-badge.soon   { color: var(--text-muted); border-color: var(--border-light); }

  /* ─── AREAS PAGE ────────────────────────── */
  #areas {
    flex-direction: row;
    height: 100%;
    overflow: hidden;
  }

  /* ─── PROJECTS PANEL ────────────────────── */
  .projects-panel {
    width: 360px;
    min-width: 360px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  .panel-header {
    padding: 22px 28px 18px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .back-btn {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    cursor: pointer;
    background: none;
    border: none;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 18px;
    transition: color 0.2s;
    padding: 0;
  }
  .back-btn:hover { color: var(--gold); }

  .panel-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .panel-title {
    font-size: 26px;
    font-weight: 300;
    line-height: 1.15;
  }
  .panel-title em { font-style: italic; color: var(--gold); }

  .projects-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border-light) transparent;
  }

  .project-item {
    padding: 14px 28px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.18s ease;
  }

  .project-item:hover {
    background: var(--surface);
    border-left-color: var(--border-light);
  }

  .project-item.selected {
    background: var(--surface-2);
    border-left-color: var(--gold);
  }

  .proj-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 5px;
  }

  .proj-name {
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
  }

  .p-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }
  .p-dot.high   { background: var(--high); }
  .p-dot.medium { background: var(--med); }
  .p-dot.low    { background: var(--low); }
  .p-dot.none   { background: var(--text-muted); opacity: 0.4; }

  .proj-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .proj-date-txt {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  .task-ct {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }

  /* ─── TASKS PANEL ───────────────────────── */
  .tasks-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
    min-width: 0;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .empty-glyph {
    font-family: var(--font-mono);
    font-size: 40px;
    color: var(--text-muted);
    opacity: 0.25;
    letter-spacing: -4px;
  }

  .empty-hint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
  }

  #project-view {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  /* ─── PROJECT HEADER ────────────────────── */
  .proj-view-header {
    padding: 22px 36px 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .proj-view-name {
    font-size: 30px;
    font-weight: 300;
    line-height: 1.2;
    outline: none;
    margin-bottom: 14px;
    cursor: text;
    transition: color 0.2s;
  }

  .proj-view-name:empty::before {
    content: attr(data-placeholder);
    color: var(--text-muted);
    font-style: italic;
  }

  .proj-view-name:focus { color: var(--text); }

  .proj-fields {
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .fgroup {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .flabel {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .finput {
    background: none;
    border: none;
    border-bottom: 1px solid var(--border-light);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 2px 3px;
    outline: none;
    transition: border-color 0.2s, color 0.2s;
    width: 120px;
  }
  .finput:focus { border-bottom-color: var(--gold); color: var(--text); }

  input[type="date"].finput { color-scheme: light; width: 130px; }

  .psel {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 8px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .psel:focus { border-color: var(--gold); }

  .proj-desc-area {
    background: none;
    border: none;
    border-left: 2px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-serif);
    font-size: 14px;
    font-style: italic;
    padding: 6px 14px;
    width: 100%;
    resize: none;
    outline: none;
    line-height: 1.65;
    min-height: 42px;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 14px;
  }
  .proj-desc-area:focus { border-left-color: var(--gold); color: var(--text); }
  .proj-desc-area::placeholder { color: var(--text-muted); font-style: italic; }

  /* ─── TASKS CONTENT ─────────────────────── */
  .tasks-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 36px 32px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-light) transparent;
  }

  .tasks-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 10px;
  }

  .tasks-bar-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .add-btn {
    background: none;
    border: 1px solid var(--border-light);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 4px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .add-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* New task form */
  .new-task-row {
    display: none;
    border: 1px dashed var(--border-light);
    padding: 14px 16px 12px;
    margin-bottom: 2px;
    animation: fadeUp 0.18s ease;
  }
  .new-task-row.open { display: block; }

  .new-task-input {
    background: none;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-serif);
    font-size: 15px;
    width: 100%;
    outline: none;
    padding: 4px 0 6px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .new-task-input:focus { border-bottom-color: var(--gold); }
  .new-task-input::placeholder { color: var(--text-muted); }

  .form-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-save {
    background: var(--gold);
    border: none;
    color: #f5f1eb;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 6px 16px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 500;
    transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.82; }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    padding: 6px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text); }

  /* Task item */
  .task-item {
    border: 1px solid var(--border);
    margin-bottom: 2px;
    transition: border-color 0.18s;
    animation: fadeUp 0.2s ease both;
  }
  .task-item:hover:not(.expanded) { border-color: var(--border-light); }
  .task-item.expanded { border-color: var(--gold-dim); }

  .task-main {
    display: flex;
    align-items: center;
    padding: 11px 14px;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }

  .t-check {
    width: 13px;
    height: 13px;
    border: 1px solid var(--border-light);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    font-size: 9px;
  }
  .t-check:hover { border-color: var(--gold); }
  .t-check.done { background: var(--done-clr); border-color: var(--done-clr); color: var(--text); }

  .t-bar {
    width: 3px;
    height: 20px;
    border-radius: 1px;
    flex-shrink: 0;
  }
  .t-bar.high   { background: var(--high); }
  .t-bar.medium { background: var(--med); }
  .t-bar.low    { background: var(--low); }
  .t-bar.none   { background: var(--surface-3); }

  .t-name {
    flex: 1;
    font-size: 14px;
    color: var(--text);
    transition: color 0.18s;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .t-name.done { text-decoration: line-through; color: var(--text-muted); }

  .t-date {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .t-arrow {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    flex-shrink: 0;
    transition: transform 0.18s;
  }
  .task-item.expanded .t-arrow { transform: rotate(90deg); }

  /* Task expand */
  .task-detail {
    display: none;
    padding: 0 14px 14px 40px;
    border-top: 1px solid var(--border);
  }
  .task-item.expanded .task-detail { display: block; }

  .task-detail-fields {
    display: flex;
    gap: 18px;
    padding: 10px 0 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .task-desc {
    background: none;
    border: none;
    border-left: 2px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-serif);
    font-size: 13px;
    font-style: italic;
    padding: 5px 12px;
    width: 100%;
    resize: none;
    outline: none;
    line-height: 1.65;
    min-height: 56px;
    transition: border-color 0.2s, color 0.2s;
  }
  .task-desc:focus { border-left-color: var(--gold); color: var(--text); }
  .task-desc::placeholder { color: var(--text-muted); }

  .del-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--font-mono);
    font-size: 9px;
    cursor: pointer;
    letter-spacing: 0.12em;
    padding: 6px 0 0;
    transition: color 0.2s;
    text-transform: uppercase;
  }
  .del-btn:hover { color: var(--high); }

  /* Empty tasks */
  .no-tasks {
    text-align: center;
    padding: 36px 0;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
  }

  /* ─── ANIMATIONS ────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-card { animation: fadeUp 0.3s ease both; }
  .section-card:nth-child(1) { animation-delay: 0.05s; }
  .section-card:nth-child(2) { animation-delay: 0.10s; }
  .section-card:nth-child(3) { animation-delay: 0.15s; }
  .section-card:nth-child(4) { animation-delay: 0.20s; }
  .section-card:nth-child(5) { animation-delay: 0.25s; }

  .project-item { animation: fadeUp 0.22s ease both; }
  .project-item:nth-child(1) { animation-delay: 0.00s; }
  .project-item:nth-child(2) { animation-delay: 0.04s; }
  .project-item:nth-child(3) { animation-delay: 0.08s; }
  .project-item:nth-child(4) { animation-delay: 0.12s; }
  .project-item:nth-child(5) { animation-delay: 0.16s; }

  /* ─── SCROLLBARS ────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }
</style>
</head>
<body>

<!-- ══════════ HOME PAGE ══════════ -->
<div class="page active" id="home">
  <div class="home-header">
    <div class="home-label">Command Center</div>
    <h1 class="home-title">Amit<br><em>Singh</em></h1>
    <div class="gold-rule"></div>
    <div class="home-date" id="home-date"></div>
  </div>

  <div class="sections-grid">
    <div class="section-card enabled" onclick="showPage('areas')">
      <div class="card-number">01</div>
      <div class="card-title">Areas of Responsibility</div>
      <div class="card-badge active">Active</div>
    </div>
    <div class="section-card disabled">
      <div class="card-number">02</div>
      <div class="card-title">Weekly Sprint</div>
      <div class="card-badge soon">Soon</div>
    </div>
    <div class="section-card disabled">
      <div class="card-number">03</div>
      <div class="card-title">Habit Tracker</div>
      <div class="card-badge soon">Soon</div>
    </div>
    <div class="section-card disabled">
      <div class="card-number">04</div>
      <div class="card-title">Notes &amp; Thinking</div>
      <div class="card-badge soon">Soon</div>
    </div>
    <div class="section-card disabled">
      <div class="card-number">05</div>
      <div class="card-title">Metrics &amp; Review</div>
      <div class="card-badge soon">Soon</div>
    </div>
  </div>
</div>

<!-- ══════════ AREAS OF RESPONSIBILITY ══════════ -->
<div class="page" id="areas">

  <!-- Left: Projects -->
  <div class="projects-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="showPage('home')">← Home</button>
      <div class="panel-label">Section 01</div>
      <div class="panel-title">Areas of<br><em>Responsibility</em></div>
    </div>
    <div class="projects-list" id="projects-list"></div>
  </div>

  <!-- Right: Tasks -->
  <div class="tasks-panel">

    <div class="empty-state" id="empty-state">
      <div class="empty-glyph">◈◈◈</div>
      <div class="empty-hint">Select a project</div>
    </div>

    <div id="project-view">
      <div class="proj-view-header" id="proj-view-header"></div>
      <div class="tasks-scroll" id="tasks-scroll"></div>
    </div>

  </div>
</div>

<script>
// ══════════ DEFAULT DATA ══════════
const DEFAULTS = [
  { id:'p1', name:'Revenue 5L / month',              priority:'high',   dueDate:'', description:'', tasks:[] },
  { id:'p2', name:'Full Stack Creator + Ads Platform',priority:'high',   dueDate:'', description:'', tasks:[] },
  { id:'p3', name:'Secure your Next Stint',           priority:'medium', dueDate:'', description:'', tasks:[] },
  { id:'p4', name:'Self + Galvor Branding',           priority:'medium', dueDate:'', description:'', tasks:[] },
  { id:'p5', name:'Upskill on AI',                   priority:'low',    dueDate:'', description:'', tasks:[] },
];

// ══════════ STATE ══════════
let state = loadState();
let activeProjId  = null;
let expandTaskId  = null;
let addFormOpen   = false;

function loadState() {
  try {
    const s = localStorage.getItem('cmd_areas_v1');
    return s ? JSON.parse(s) : { projects: JSON.parse(JSON.stringify(DEFAULTS)) };
  } catch(e) {
    return { projects: JSON.parse(JSON.stringify(DEFAULTS)) };
  }
}

function persist() {
  localStorage.setItem('cmd_areas_v1', JSON.stringify(state));
}

function proj(id) { return state.projects.find(p => p.id === id); }

// ══════════ NAVIGATION ══════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'areas') { renderProjects(); }
}

// ══════════ HOME DATE ══════════
document.getElementById('home-date').textContent =
  new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

// ══════════ UTILS ══════════
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}

function uid() { return 't_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

// ══════════ PROJECTS LIST ══════════
function renderProjects() {
  const list = document.getElementById('projects-list');
  list.innerHTML = '';
  state.projects.forEach(p => {
    const total  = p.tasks.length;
    const done   = p.tasks.filter(t => t.done).length;
    const el     = document.createElement('div');
    el.className = 'project-item' + (p.id === activeProjId ? ' selected' : '');
    el.onclick   = () => selectProject(p.id);
    el.innerHTML = `
      <div class="proj-top">
        <div class="proj-name">${escHtml(p.name)}</div>
        <div class="p-dot ${p.priority || 'none'}"></div>
      </div>
      <div class="proj-meta">
        <span class="proj-date-txt">${p.dueDate ? fmtDate(p.dueDate) : 'No due date'}</span>
        <span class="task-ct">${done}/${total} tasks</span>
      </div>
    `;
    list.appendChild(el);
  });
}

function selectProject(id) {
  activeProjId = id;
  expandTaskId = null;
  addFormOpen  = false;
  renderProjects();
  renderProjectView();
}

// ══════════ PROJECT VIEW ══════════
function renderProjectView() {
  const p = proj(activeProjId);
  if (!p) return;

  document.getElementById('empty-state').style.display  = 'none';
  document.getElementById('project-view').style.display = 'flex';
  document.getElementById('project-view').style.flexDirection = 'column';
  document.getElementById('project-view').style.flex    = '1';
  document.getElementById('project-view').style.overflow = 'hidden';

  // ── Header ──
  const header = document.getElementById('proj-view-header');
  header.innerHTML = `
    <div class="proj-view-name"
      contenteditable="true"
      data-placeholder="Project name"
      data-id="${p.id}"
      onblur="onProjNameBlur(this)"
      onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
    >${escHtml(p.name)}</div>

    <div class="proj-fields">
      <div class="fgroup">
        <span class="flabel">Due</span>
        <input type="date" class="finput" value="${p.dueDate||''}"
          onchange="setProjField('${p.id}','dueDate',this.value)">
      </div>
      <div class="fgroup">
        <span class="flabel">Priority</span>
        <select class="psel" onchange="setProjField('${p.id}','priority',this.value)">
          <option value="high"   ${p.priority==='high'   ?'selected':''}>High</option>
          <option value="medium" ${p.priority==='medium' ?'selected':''}>Medium</option>
          <option value="low"    ${p.priority==='low'    ?'selected':''}>Low</option>
          <option value="none"   ${!p.priority||p.priority==='none'?'selected':''}>None</option>
        </select>
      </div>
    </div>

    <textarea class="proj-desc-area"
      placeholder="Describe this project…"
      onblur="setProjField('${p.id}','description',this.value)"
      oninput="autoResize(this)"
    >${escHtml(p.description||'')}</textarea>
  `;

  // auto-resize
  const ta = header.querySelector('.proj-desc-area');
  autoResize(ta);

  // ── Tasks ──
  renderTasks();
}

function onProjNameBlur(el) {
  const id  = el.dataset.id;
  const val = el.textContent.trim();
  if (!val) return;
  const p = proj(id);
  if (p) { p.name = val; persist(); renderProjects(); }
}

function setProjField(id, field, value) {
  const p = proj(id);
  if (!p) return;
  p[field] = value;
  persist();
  renderProjects();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ══════════ TASKS ══════════
function renderTasks() {
  const p      = proj(activeProjId);
  if (!p) return;
  const scroll = document.getElementById('tasks-scroll');

  scroll.innerHTML = `
    <div class="tasks-bar">
      <span class="tasks-bar-label">Tasks — ${p.tasks.filter(t=>t.done).length}/${p.tasks.length} done</span>
      <button class="add-btn" onclick="toggleAddForm()">+ Add Task</button>
    </div>

    <div class="new-task-row ${addFormOpen?'open':''}" id="new-task-row">
      <input type="text" class="new-task-input" id="nt-name" placeholder="Task name…"
        onkeydown="if(event.key==='Enter') commitNewTask()">
      <div class="form-row">
        <div class="fgroup">
          <span class="flabel">Priority</span>
          <select class="psel" id="nt-priority">
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="fgroup">
          <span class="flabel">Due</span>
          <input type="date" class="finput" id="nt-date" style="width:130px">
        </div>
        <button class="btn-save" onclick="commitNewTask()">Add</button>
        <button class="btn-cancel" onclick="toggleAddForm()">Cancel</button>
      </div>
    </div>

    <div id="task-list"></div>
  `;

  if (addFormOpen) setTimeout(() => document.getElementById('nt-name')?.focus(), 0);

  const list = document.getElementById('task-list');

  if (p.tasks.length === 0) {
    list.innerHTML = '<div class="no-tasks">No tasks yet — add one above</div>';
    return;
  }

  p.tasks.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'task-item' + (t.id === expandTaskId ? ' expanded' : '');
    el.style.animationDelay = (i * 0.03) + 's';
    el.innerHTML = `
      <div class="task-main" onclick="toggleExpand('${t.id}')">
        <div class="t-check ${t.done?'done':''}"
          onclick="event.stopPropagation(); toggleDone('${t.id}')"
        >${t.done ? '✓' : ''}</div>
        <div class="t-bar ${t.priority||'none'}"></div>
        <div class="t-name ${t.done?'done':''}">${escHtml(t.name)}</div>
        ${t.dueDate ? `<div class="t-date">${fmtDate(t.dueDate)}</div>` : ''}
        <div class="t-arrow">›</div>
      </div>
      <div class="task-detail">
        <div class="task-detail-fields">
          <div class="fgroup">
            <span class="flabel">Name</span>
            <input type="text" class="finput" value="${escAttr(t.name)}" style="width:180px"
              onblur="setTaskField('${t.id}','name',this.value)">
          </div>
          <div class="fgroup">
            <span class="flabel">Due</span>
            <input type="date" class="finput" value="${t.dueDate||''}"
              onchange="setTaskField('${t.id}','dueDate',this.value)">
          </div>
          <div class="fgroup">
            <span class="flabel">Priority</span>
            <select class="psel" onchange="setTaskField('${t.id}','priority',this.value)">
              <option value="high"   ${t.priority==='high'   ?'selected':''}>High</option>
              <option value="medium" ${t.priority==='medium' ?'selected':''}>Medium</option>
              <option value="low"    ${t.priority==='low'    ?'selected':''}>Low</option>
              <option value="none"   ${!t.priority||t.priority==='none'?'selected':''}>None</option>
            </select>
          </div>
        </div>
        <textarea class="task-desc" placeholder="Add notes, links, context…"
          onblur="setTaskField('${t.id}','description',this.value)"
        >${escHtml(t.description||'')}</textarea>
        <button class="del-btn" onclick="deleteTask('${t.id}')">× Remove task</button>
      </div>
    `;
    list.appendChild(el);
  });
}

function toggleExpand(id) {
  expandTaskId = (expandTaskId === id) ? null : id;
  renderTasks();
}

function toggleDone(id) {
  const p = proj(activeProjId);
  const t = p?.tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; persist(); renderTasks(); renderProjects(); }
}

function setTaskField(id, field, value) {
  const p = proj(activeProjId);
  const t = p?.tasks.find(x => x.id === id);
  if (!t) return;
  t[field] = value;
  persist();
  if (['priority','dueDate','name'].includes(field)) renderTasks();
  renderProjects();
}

function deleteTask(id) {
  const p = proj(activeProjId);
  if (!p) return;
  p.tasks = p.tasks.filter(t => t.id !== id);
  if (expandTaskId === id) expandTaskId = null;
  persist();
  renderTasks();
  renderProjects();
}

function toggleAddForm() {
  addFormOpen = !addFormOpen;
  renderTasks();
}

function commitNewTask() {
  const nameEl = document.getElementById('nt-name');
  const name   = nameEl?.value.trim();
  if (!name) { nameEl?.focus(); return; }

  const p = proj(activeProjId);
  if (!p) return;

  p.tasks.push({
    id:          uid(),
    name,
    priority:    document.getElementById('nt-priority').value,
    dueDate:     document.getElementById('nt-date').value,
    description: '',
    done:        false,
  });

  addFormOpen = false;
  persist();
  renderTasks();
  renderProjects();
}

// ══════════ SANITISE ══════════
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s); }

// ══════════ BOOT ══════════
renderProjects();
</script>
</body>
</html>
